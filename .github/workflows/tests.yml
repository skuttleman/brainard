name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  deps:
    name: Download dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Install all deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -P
          clojure -P -M:build
          clojure -P -M:dev
          clojure -P -M:lint
          clojure -P -M:shadow
          clojure -P -M:test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run linter
        run: clojure -M:lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run unit tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/unit --lcov :api :infra
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: target/coverage/unit

  cljs-unit-tests:
    name: Clojurescript unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run clojurescript unit tests
        run: |
          make build-test
          clojure -M:test -m brainard.test.runner

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run integration tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/integration --lcov :integration
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: target/coverage/integration

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install sass
        run: npm install -g sass
      - name: Build uberjar
        run: make uberjar
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run webdriver tests
        run: |
          set -o pipefail
          set +e
          # initial run - write browser coverage to target/coverage/ui
          BROWSER_COV_DIR=target/coverage/ui clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/ui --lcov :ui | tee test-output.txt
          rc=${PIPESTATUS[0]}
          set -e
          set +o pipefail

          # if any tests fail/error, rerun failures to counteract webdriver flakiness
          if [ $rc -ne 0 ]; then
            fails=$(perl -ne 's/\x1b[[0-9;]*[A-Za-z]//g; \
                    print "$1\n" if /(?:ERROR|FAIL)\s+in\s+(\S+)/' test-output.txt | sort -u)
            if [ -n "$fails" ]; then
             echo "Re-running failed tests:"; echo "$fails"
             echo " ---------------------- "
             args=()
              while IFS= read -r f; do args+=( "--focus" "$f" ); done <<< "$fails"
              # rerun - write browser coverage to target/coverage/ui-rerun
              SCREENSHOT=true BROWSER_COV_DIR=target/coverage/ui-rerun clojure \
                -M:test -m kaocha.runner --plugin cloverage \
                --cov-output target/coverage/ui-rerun --lcov :ui "${args[@]}"
            else
              echo "No specific failures parsed; re-running full UI suite"
              # rerun full - write browser coverage to target/coverage/ui-rerun
              SCREENSHOT=true BROWSER_COV_DIR=target/coverage/ui-rerun clojure \
                -M:test -m kaocha.runner --plugin cloverage \
                --cov-output target/coverage/ui-rerun --lcov :ui
            fi
          fi
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          HEADLESS: "true"
      - name: Convert browser coverage JSON -> lcov (nyc)
        if: always()
        run: |
          set -euo pipefail

          echo "Converting browser coverage JSON to lcov..."

          # install nyc transiently
          npm install --no-save nyc

          # ensure nyc input dir exists
          mkdir -p .nyc_output

          files_copied=0
          for src in \
            target/coverage/ui/browser-coverage.json \
            target/coverage/ui-rerun/browser-coverage.json; do
            if [ -f "$src" ]; then
              base=$(basename "$src" .json)
              dest=".nyc_output/${base}-$(date +%s).json"
              cp "$src" "$dest"
              echo "Copied $src -> $dest"
              files_copied=$((files_copied + 1))
            fi
          done

          if [ "$files_copied" -eq 0 ]; then
            echo "No browser coverage JSON files found; skipping nyc report generation."
            exit 0
          fi

          mkdir -p target/coverage/ui
          npx nyc report --reporter=lcov --report-dir target/coverage/ui

          echo "Generated LCOV files in target/coverage/ui:"
          ls -la target/coverage/ui || true
        env:
          NODE_ENV: test

      - name: Upload failed test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ./*.png

      - name: Upload UI coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: target/coverage/ui*

  merge-coverage:
    name: Merge coverage artifacts
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, ui-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Merge lcov files
        run: |
          set -e
          files=$(find coverage-artifacts -type f -name '*.info' -print)
          if [ -z "$files" ]; then echo "No coverage files found"; exit 0; fi
          lcov -a "$(echo $files | tr '\n' ' ')" -o merged.info
          genhtml merged.info -o target/coverage/merged
      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: target/coverage/merged
