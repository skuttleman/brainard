name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  deps:
    name: Download dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Install all deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -P
          clojure -P -M:build
          clojure -P -M:dev
          clojure -P -M:lint
          clojure -P -M:shadow
          clojure -P -M:test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run linter
        run: clojure -M:lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run unit tests
        run: clojure -M:test -m kaocha.runner :api :infra

  cljs-unit-tests:
    name: Clojurescript unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run clojurescript unit tests
        run: |
          make build-test-cljs
          clojure -M:test -m brainard.test.runner

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run integration tests
        run: clojure -M:test -m kaocha.runner :integration

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install sass
        run: npm install -g sass
      - name: Build uberjar
        run: make uberjar
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run webdriver tests
        run: |
          # Avoid webdriver flakiness
          clojure -M:test -m kaocha.runner :ui || clojure -M:test -m kaocha.runner :ui
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          HEADLESS: "true"
