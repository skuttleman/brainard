name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  deps:
    name: Download dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Install all deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -P
          clojure -P -M:build
          clojure -P -M:dev
          clojure -P -M:lint
          clojure -P -M:shadow
          clojure -P -M:test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run linter
        run: clojure -M:lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run unit tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/unit --lcov \
            --cov-ns-exclude-regex 'brainard\.infra\.views\..*' \
            --cov-ns-exclude-regex 'brainard\.infra\.stubs\..*' \
            :api :infra
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: target/coverage/unit

  cljs-unit-tests:
    name: Clojurescript unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run clojurescript unit tests
        run: |
          make build-test
          clojure -M:test -m brainard.test.runner

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run integration tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/integration --lcov \
            --cov-ns-exclude-regex 'brainard\.infra\.views\..*' \
            --cov-ns-exclude-regex 'brainard\.infra\.stubs\..*' \
            :integration
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: target/coverage/integration

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build uberjar
        run: make uberjar
      - name: Prepare JS for coverage
        run: |
          npm ci
          npm install -g sass
          rm -rf resources/public/js target/nyc_output
          clojure -A:shadow:dev -M -m shadow.cljs.devtools.cli compile ui-cov
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run webdriver tests
        run: |
          set -o pipefail
          set +e
          clojure -M:test -m kaocha.runner :ui | tee test-output.txt
          rc=${PIPESTATUS[0]}
          set -e
          set +o pipefail

          # if any tests fail/error, rerun failures to counteract webdriver flakiness
          if [ $rc -ne 0 ]; then
            fails=$(perl -ne 's/\x1b[[0-9;]*[A-Za-z]//g; \
                    print "$1\n" if /(?:ERROR|FAIL)\s+in\s+(\S+)/' test-output.txt | sort -u)
            if [ -n "$fails" ]; then
             echo "Re-running failed tests:"; echo "$fails"
             echo " ---------------------- "
             args=()
              while IFS= read -r f; do args+=( "--focus" "$f" ); done <<< "$fails"
              SCREENSHOT=true clojure -M:test -m kaocha.runner :ui "${args[@]}"
            else
              echo "No specific failures parsed; re-running full UI suite"
              SCREENSHOT=true clojure -M:test -m kaocha.runner :ui
            fi
          fi
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          HEADLESS: "true"
          JS_COVERAGE: "true"
      - name: Upload failed test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ./*.png

      - name: Debug JS coverage artifacts
        if: always()
        run: |
          echo "== resources/public/js/main.js =="
          if [ -f resources/public/js/main.js ]; then
            echo "main.js exists"; 
            grep -n "cov_" resources/public/js/main.js | head -n 5 || true
            echo "--- first 200 chars of main.js ---";
            head -c 200 resources/public/js/main.js || true
          else
            echo "main.js not present"
          fi

          echo "== foo.txt preview =="
          if [ -f foo.txt ]; then head -c 500 foo.txt || true; else echo "foo.txt not present"; fi

          echo "== target/nyc_output =="
          if [ -d target/nyc_output ]; then ls -la target/nyc_output || true; else echo "target/nyc_output not present"; fi

      - name: Generate JS coverage report
        if: always()
        run: |
          node dev/nyc-report.js
          src_dirs="src modules/api/src modules/infra/src"
          cljs_prefix="resources/public/js/cljs-runtime/"
          current_file=""
          current_lines=0
          while IFS= read -r line; do
            if [[ "$line" == SF:* ]]; then
              rel="${line#SF:}"
              rel="${rel#$cljs_prefix}"
              resolved="$rel"
              for srcdir in $src_dirs; do
                if [ -f "$srcdir/$rel" ]; then
                  resolved="$srcdir/$rel"
                  break
                fi
              done
              current_file="$resolved"
              current_lines=0
              if [ -f "$resolved" ]; then current_lines=$(wc -l < "$resolved"); fi
              echo "SF:$resolved"
            elif [[ "$line" == DA:* && $current_lines -gt 0 ]]; then
              lineno="$(echo "$line" | cut -d: -f2 | cut -d, -f1)"
              if [ "$lineno" -le "$current_lines" ]; then echo "$line"; fi
            else
              echo "$line"
            fi
          done < target/coverage/js/lcov.info > target/coverage/js/lcov.normalized.info
          mv target/coverage/js/lcov.normalized.info target/coverage/js/lcov.info
          echo "JS coverage paths normalized"

      - name: Upload UI coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: |
            target/coverage/ui*
            target/coverage/js

  merge-coverage:
    name: Merge coverage artifacts
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, ui-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Merge lcov files
        run: |
          set -e
          files=$(find coverage-artifacts -type f -name '*.info' -print)
          if [ -z "$files" ]; then echo "No coverage files found"; exit 0; fi

          # Determine workspace root (GitHub Actions sets GITHUB_WORKSPACE). Fall back to cwd.
          workspace=${GITHUB_WORKSPACE:-$(pwd)}

          # Normalize each lcov file: strip workspace prefix from SF paths, map
          # cljs-runtime SF paths to repo sources, and drop DA entries whose line
          # numbers exceed the source file's line count.
          for f in $files; do
            tmp=$(mktemp)
            current_lines=0
            while IFS= read -r line; do
              if [[ "$line" == SF:* ]]; then
                sf="${line#SF:}"
                # Strip workspace prefix if present
                if [[ "$sf" == "$workspace"/* ]]; then
                  sf="${sf#$workspace/}"
                fi

                if [[ "$sf" == resources/public/js/cljs-runtime/* ]]; then
                  rel="${sf#resources/public/js/cljs-runtime/}"
                  resolved="$rel"
                  for srcdir in src modules/api/src modules/infra/src; do
                    if [ -f "$srcdir/$rel" ]; then
                      resolved="$srcdir/$rel"
                      break
                    fi
                  done
                  echo "SF:$resolved" >> "$tmp"
                  if [ -f "$resolved" ]; then current_lines=$(wc -l < "$resolved"); else current_lines=0; fi
                else
                  # Write SF without workspace prefix
                  echo "SF:$sf" >> "$tmp"
                  if [ -f "$sf" ]; then current_lines=$(wc -l < "$sf"); else current_lines=0; fi
                fi
              elif [[ "$line" == DA:* ]]; then
                if [ "$current_lines" -gt 0 ]; then
                  lineno=$(echo "$line" | cut -d: -f2 | cut -d, -f1)
                  if [ "$lineno" -le "$current_lines" ]; then echo "$line" >> "$tmp"; fi
                else
                  echo "$line" >> "$tmp"
                fi
              else
                echo "$line" >> "$tmp"
              fi
            done < "$f"
            mv "$tmp" "$f"
          done

          mkdir -p target/coverage/merged
          first=$(echo "$files" | head -n1)
          lcov -a "$first" -o target/coverage/merged/merged.info
          echo "$files" | tail -n +2 | while read ff; do lcov -a target/coverage/merged/merged.info -a "$ff" -o target/coverage/merged/merged.info; done

          # Use genhtml after normalization
          genhtml target/coverage/merged/merged.info -o target/coverage/merged
      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: target/coverage/merged
