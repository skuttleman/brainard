name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  deps:
    name: Download dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Install all deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -P
          clojure -P -M:build
          clojure -P -M:dev
          clojure -P -M:lint
          clojure -P -M:shadow
          clojure -P -M:test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run linter
        run: clojure -M:lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run unit tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/unit --lcov \
            --cov-ns-exclude-regex 'brainard\.infra\.views\..*' \
            --cov-ns-exclude-regex 'brainard\.infra\.stubs\..*' \
            :api :infra
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: target/coverage/unit

  cljs-unit-tests:
    name: Clojurescript unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run clojurescript unit tests
        run: |
          make build-test
          clojure -M:test -m brainard.test.runner

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run integration tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/integration --lcov \
            --cov-ns-exclude-regex 'brainard\.infra\.views\..*' \
            --cov-ns-exclude-regex 'brainard\.infra\.stubs\..*' \
            :integration
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: target/coverage/integration

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Prepare JS for coverage
        run: |
          npm ci
          npm install -g sass
          rm -rf resources/public/js target/nyc_output
          clojure -A:shadow:dev -M -m shadow.cljs.devtools.cli compile ui-cov
      - name: Build uberjar
        run: make uberjar
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run webdriver tests
        run: |
          set -o pipefail
          set +e
          clojure -M:test -m kaocha.runner cloverage :ui | tee test-output.txt
          rc=${PIPESTATUS[0]}
          set -e
          set +o pipefail

          # if any tests fail/error, rerun failures to counteract webdriver flakiness
          if [ $rc -ne 0 ]; then
            fails=$(perl -ne 's/\x1b[[0-9;]*[A-Za-z]//g; \
                    print "$1\n" if /(?:ERROR|FAIL)\s+in\s+(\S+)/' test-output.txt | sort -u)
            if [ -n "$fails" ]; then
             echo "Re-running failed tests:"; echo "$fails"
             echo " ---------------------- "
             args=()
              while IFS= read -r f; do args+=( "--focus" "$f" ); done <<< "$fails"
              SCREENSHOT=true clojure -M:test -m kaocha.runner cloverage :ui "${args[@]}"
            else
              echo "No specific failures parsed; re-running full UI suite"
              SCREENSHOT=true clojure -M:test -m kaocha.runner cloverage :ui
            fi
          fi
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          HEADLESS: "true"
          JS_COVERAGE: "true"
      - name: Upload failed test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ./*.png

      - name: Generate JS coverage report
        if: always()
        run: |
          node dev/nyc-report.js
          src_dirs="src modules/api/src modules/infra/src"
          cljs_prefix="resources/public/js/cljs-runtime/"
          current_file=""
          current_lines=0
          while IFS= read -r line; do
            if [[ "$line" == SF:* ]]; then
              rel="${line#SF:}"
              rel="${rel#$cljs_prefix}"
              resolved="$rel"
              for srcdir in $src_dirs; do
                if [ -f "$srcdir/$rel" ]; then
                  resolved="$srcdir/$rel"
                  break
                fi
              done
              current_file="$resolved"
              current_lines=0
              if [ -f "$resolved" ]; then current_lines=$(wc -l < "$resolved"); fi
              echo "SF:$resolved"
            elif [[ "$line" == DA:* && $current_lines -gt 0 ]]; then
              lineno="$(echo "$line" | cut -d: -f2 | cut -d, -f1)"
              if [ "$lineno" -le "$current_lines" ]; then echo "$line"; fi
            else
              echo "$line"
            fi
          done < target/coverage/js/lcov.info > target/coverage/js/lcov.normalized.info
          mv target/coverage/js/lcov.normalized.info target/coverage/js/lcov.info
          echo "JS coverage paths normalized"

      - name: Upload UI coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: |
            target/coverage/ui*
            target/coverage/js

  merge-coverage:
    name: Merge coverage artifacts
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, ui-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Merge lcov files
        run: |
          set -e
          files=$(find coverage-artifacts -type f -name '*.info' -print)
          if [ -z "$files" ]; then echo "No coverage files found"; exit 0; fi
          mkdir -p target/coverage/merged
          first=$(echo "$files" | head -n1)
          lcov -a "$first" -o target/coverage/merged/merged.info
          echo "$files" | tail -n +2 | while read f; do lcov -a target/coverage/merged/merged.info -a "$f" -o target/coverage/merged/merged.info; done
          genhtml --ignore-errors range,category target/coverage/merged/merged.info -o target/coverage/merged
      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: target/coverage/merged
