name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  deps:
    name: Download dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Install all deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -P
          clojure -P -M:build
          clojure -P -M:dev
          clojure -P -M:lint
          clojure -P -M:shadow
          clojure -P -M:test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run linter
        run: clojure -M:lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run unit tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/unit --lcov \
            --cov-ns-exclude-regex 'brainard\.infra\.views\..*' \
            --cov-ns-exclude-regex 'brainard\.infra\.stubs\..*' \
            :api :infra
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: target/coverage/unit

  cljs-unit-tests:
    name: Clojurescript unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run clojurescript unit tests
        run: |
          make build-test
          clojure -M:test -m brainard.test.runner

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run integration tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/integration --lcov \
            --cov-ns-exclude-regex 'brainard\.infra\.views\..*' \
            --cov-ns-exclude-regex 'brainard\.infra\.stubs\..*' \
            :integration
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: target/coverage/integration

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build uberjar
        run: make uberjar
      - name: Prepare JS for coverage
        run: |
          npm ci
          npm install -g sass
          rm -rf resources/public/js target/nyc_output
          clojure -A:shadow:dev -M -m shadow.cljs.devtools.cli compile ui-cov
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run webdriver tests
        run: |
          set -o pipefail
          set +e
          clojure -M:test -m kaocha.runner :ui | tee test-output.txt
          rc=${PIPESTATUS[0]}
          set -e
          set +o pipefail

          # if any tests fail/error, rerun failures to counteract webdriver flakiness
          if [ $rc -ne 0 ]; then
            fails=$(perl -ne 's/\x1b[[0-9;]*[A-Za-z]//g; \
                    print "$1\n" if /(?:ERROR|FAIL)\s+in\s+(\S+)/' test-output.txt | sort -u)
            if [ -n "$fails" ]; then
             echo "Re-running failed tests:"; echo "$fails"
             echo " ---------------------- "
             args=()
              while IFS= read -r f; do args+=( "--focus" "$f" ); done <<< "$fails"
              SCREENSHOT=true clojure -M:test -m kaocha.runner :ui "${args[@]}"
            else
              echo "No specific failures parsed; re-running full UI suite"
              SCREENSHOT=true clojure -M:test -m kaocha.runner :ui
            fi
          fi
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          HEADLESS: "true"
          JS_COVERAGE: "true"
      - name: Upload failed test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ./*.png
      - name: Upload UI coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: |
            target/coverage/ui*
