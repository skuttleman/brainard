name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  deps:
    name: Download dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/cache@v4
        id: npm_cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'package-lock.json') }}
      - name: Install all deps
        if: steps.cache.outputs.cache-hit != 'true' || steps.npm_cache.outputs.cache-hit != 'true'
        run: |
          for alias in '' :build :dev :lint :shadow :test :tools; do
            clojure -P -M$alias
          done
          npm ci
          npm install -g sass

  build:
    name: Build uberjar
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/cache@v4
        id: npm_cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'package-lock.json') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build uberjar
        run: make uberjar

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run linter
        run: clojure -M:lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run unit tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/unit --lcov \
            --cov-ns-exclude-regex 'brainard\..*\.(multipart-params|routes\.ui)' \
            --cov-ns-exclude-regex 'brainard\..*\.views.*' \
            :api :infra
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: target/coverage/unit

  cljs-unit-tests:
    name: Clojurescript unit tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/cache@v4
        id: npm_cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'package-lock.json') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run clojurescript unit tests
        run: |
          make build-test
          clojure -M:test -m brainard.test.cljs.runner

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - name: Run integration tests
        run: |
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/integration --lcov \
            --cov-ns-exclude-regex 'brainard\..*\.(multipart-params|routes\.ui)' \
            --cov-ns-exclude-regex 'brainard\..*\.views.*' \
            :integration
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: target/coverage/integration

  ui-tests:
    name: UI Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: deps
    strategy:
      fail-fast: false
      matrix:
        suite: [ ui-core, ui-notes ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/cache@v4
        id: npm_cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'package-lock.json') }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Prepare JS for coverage
        run: |
          mkdir -p resources/public/css
          make build-sass
          rm -rf resources/public/js target/nyc_output
          clojure -A:shadow:test:tools -M -m shadow.cljs.devtools.cli compile ui-cov
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: 148
          install-chromedriver: true
      - name: Run webdriver tests
        run: |
          set -o pipefail
          set +e
          clojure -M:test -m kaocha.runner --plugin cloverage \
            --cov-output target/coverage/driver1 --lcov \
            --cov-ns-regex 'brainard\..*\.db' \
            --cov-ns-regex 'brainard\.*\.api\..*' \
            --cov-ns-regex 'brainard\.*\.system\..*' \
            --cov-ns-regex 'brainard\.infra\.store\..*' \
            --cov-ns-regex 'brainard\..*\.(multipart-params|routes\.ui)' :${{ matrix.suite }} | tee test-output.txt
          rc=${PIPESTATUS[0]}
          set -e
          set +o pipefail

          # if any tests fail/error, rerun failures to counteract webdriver flakiness
          if [ $rc -ne 0 ]; then
            fails=$(perl -ne 's/\x1b[[0-9;]*[A-Za-z]//g; \
                    print "$1\n" if /(?:ERROR|FAIL)\s+in\s+(\S+)/' test-output.txt | sort -u)
            echo "Re-running failed tests:"; echo "$fails"
            echo " ---------------------- "
            args=()
            while IFS= read -r f; do args+=( "--focus" "$f" ); done <<< "$fails"
            SCREENSHOT=true clojure -M:test -m kaocha.runner --plugin cloverage \
              --cov-output target/coverage/driver2 --lcov \
              --cov-ns-regex 'brainard\..*\.db' \
              --cov-ns-regex 'brainard\.*\.api\..*' \
              --cov-ns-regex 'brainard\.*\.system\..*' \
              --cov-ns-regex 'brainard\.infra\.store\..*' \
              --cov-ns-regex 'brainard\..*\.(multipart-params|routes\.ui)' :${{ matrix.suite }} "${args[@]}"
          fi
        env:
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          HEADLESS: "true"
          JS_COVERAGE: "true"
      - name: Upload failed debug test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.suite }}
          path: |
            ./brainard*.png
            ./brainard*.log
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-driver-${{ matrix.suite }}
          path: target/coverage/driver*
      - name: Upload nyc_output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nyc_output-${{ matrix.suite }}
          path: target/nyc_output

  build-passed:
    name: Build Passed
    runs-on: ubuntu-latest
    needs: [ build, lint, cljs-unit-tests, unit-tests, integration-tests, ui-tests ]
    steps:
      - run: echo "Build Passed"

  coverage-merge:
    name: Merge Coverage
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests, ui-tests ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-m2-${{ hashFiles('**/deps.edn') }}
      - uses: actions/cache@v4
        id: npm_cache
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json', 'package-lock.json') }}
      - name: Install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: target/coverage
      - name: Download nyc artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nyc_output-*
          path: target/nyc_output
          merge-multiple: true
      - name: Generate JS coverage report
        run: |
          node tools/nyc-report.js
      - name: Normalize JS coverage
        run: clojure -M:tools -m brainard.tools.coverage.normalize-js
      - name: Merge lcov files
        run: |
          mkdir -p target/coverage-merged
          clojure -M:tools -m brainard.tools.coverage.merge-lcov target/coverage target/coverage-merged
      - name: Upload merged coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: target/coverage-merged
