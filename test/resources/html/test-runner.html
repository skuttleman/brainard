<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Brainard ClojureScript Tests</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background-color: #f5f5f5;
        }
        #test-output {
            background-color: white;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 200px;
        }
        .pass {
            color: green;
        }
        .fail {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Brainard ClojureScript Tests</h1>
    <div id="test-output">Running tests...</div>
    <script src="/cljs-test/test.js"></script>
</body>
</html>
